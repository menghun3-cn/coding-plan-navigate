name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove markdown and unnecessary files
        run: |
          rm -f *.md

      - name: Copy files to public directory
        run: |
          mkdir -p public
          shopt -s extglob
          cp -r !(public) public/
          cp -r .!(?) public/ 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: coding-plan-navigate
          directory: ./public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: 3
